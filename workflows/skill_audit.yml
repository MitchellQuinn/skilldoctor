name: skill-audit

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: skill-doctor audit skills/skill-doctor/SKILL.md --out runs/skill-doctor-self-audit
      - run: pytest

